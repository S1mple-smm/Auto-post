version: "3.9"
services:
  poster-bot:
    build: .
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ALLOWED_USER_IDS=${ALLOWED_USER_IDS}
    volumes:
      - ./shop.json:/app/shop.json
